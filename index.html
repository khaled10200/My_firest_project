<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <!-- هذه الميتا تاغ ضرورية لـ Kodular -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>منتج سكانر - تحليل المنتجات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .scanner-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            min-height: 300px;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 80%;
            height: 200px;
            border: 3px solid #4CAF50;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { border-color: #4CAF50; transform: scale(1); }
            50% { border-color: #FF9800; transform: scale(1.02); }
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .product-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .category {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .category-food { background: #e3f2fd; color: #1976d2; }
        .category-cosmetic { background: #fce4ec; color: #c2185b; }
        .category-medicine { background: #e8f5e9; color: #388e3c; }

        .section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }

        .ingredient-item {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .warning-item {
            background: #fff3e0;
            border-right: 4px solid #ff9800;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            color: #e65100;
            font-size: 14px;
        }

        .history-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .history-item:active {
            background: #e0e0e0;
        }

        .history-product {
            font-weight: bold;
            color: #333;
        }

        .history-date {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .message-error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .tab.active {
            background: white;
            color: #667eea;
        }

        .hide {
            display: none;
        }

        /* رسالة الخطأ للكاميرا */
        .camera-error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 منتج سكانر</h1>
            <p>امسح الباركود لتحليل المنتج والمواد الضارة</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('scanner')">📷 مسح</div>
            <div class="tab" onclick="switchTab('history')">📜 السجل</div>
        </div>

        <!-- شاشة المسح -->
        <div id="scannerTab">
            <div class="card">
                <div class="scanner-container" id="scannerContainer">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="scanner-overlay">
                        <div class="scan-frame"></div>
                    </div>
                </div>
                <button class="btn btn-primary" id="startScannerBtn" onclick="requestCameraAndStart()" style="margin-top: 15px;">
                    ▶️ تشغيل الكاميرا
                </button>
                <button class="btn btn-secondary" onclick="stopScanner()">
                    ⏹️ إيقاف الكاميرا
                </button>
                <div id="cameraStatus" style="margin-top: 10px; font-size: 12px; text-align: center; color: #666;"></div>
            </div>
        </div>

        <!-- شاشة السجل -->
        <div id="historyTab" class="hide">
            <div class="card">
                <div id="historyList">
                    <p style="text-align: center; color: #999;">لا يوجد منتجات ممسوحة ضوئياً بعد</p>
                </div>
                <button class="btn btn-danger" onclick="clearHistory()" style="margin-top: 15px;">
                    🗑️ مسح السجل
                </button>
            </div>
        </div>

        <!-- شاشة النتيجة -->
        <div id="resultCard" class="card hide">
            <div id="resultContent"></div>
            <button class="btn btn-secondary" onclick="closeResult()">✖️ إغلاق</button>
        </div>
    </div>

    <script>
        // ======================
        // 1. إعدادات API 🔑
        // ======================
        // ⚠️ مهم: استبدل هذا المفتاح بمفتاح Gemini API الخاص بك
        // احصل على مفتاح مجاني من: https://aistudio.google.com/app/apikey
        const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY_HERE';
        
        // ======================
        // 2. المتغيرات العامة
        // ======================
        let videoStream = null;
        let scanningActive = false;
        let scanTimeout = null;
        let scanHistory = [];
        
        // ======================
        // 3. طلب صلاحية الكاميرا (مصمم خصيصاً لـ Kodular)
        // ======================
        async function requestCameraPermission() {
            const statusDiv = document.getElementById('cameraStatus');
            statusDiv.innerHTML = '⏳ جاري طلب صلاحية الكاميرا...';
            
            try {
                // طريقة 1: الطلب المباشر
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                // إيقاف المسار فوراً بعد الحصول على الصلاحية
                stream.getTracks().forEach(track => track.stop());
                statusDiv.innerHTML = '✅ صلاحية الكاميرا تم منحها بنجاح';
                statusDiv.style.color = '#4CAF50';
                return true;
                
            } catch (err) {
                console.error('Camera permission error:', err);
                
                if (err.name === 'NotAllowedError') {
                    statusDiv.innerHTML = '❌ تم رفض صلاحية الكاميرا. الرجاء منح الصلاحية من إعدادات الهاتف';
                } else if (err.name === 'NotFoundError') {
                    statusDiv.innerHTML = '❌ لا توجد كاميرا على هذا الجهاز';
                } else {
                    statusDiv.innerHTML = '❌ خطأ في الكاميرا: ' + err.message;
                }
                statusDiv.style.color = '#c62828';
                return false;
            }
        }
        
        // ======================
        // 4. تشغيل الكاميرا مع طلب الصلاحية
        // ======================
        async function requestCameraAndStart() {
            const hasPermission = await requestCameraPermission();
            if (hasPermission) {
                startScanner();
            } else {
                alert('لا يمكن تشغيل الكاميرا بدون صلاحية. الرجاء منح صلاحية الكاميرا من إعدادات الهاتف.');
            }
        }
        
        async function startScanner() {
            if (scanningActive) {
                stopScanner();
            }
            
            const statusDiv = document.getElementById('cameraStatus');
            statusDiv.innerHTML = '🔄 جاري تشغيل الكاميرا...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                videoStream = stream;
                scanningActive = true;
                statusDiv.innerHTML = '📷 الكاميرا تعمل - وجه الكاميرا نحو الباركود';
                statusDiv.style.color = '#4CAF50';
                
                // بدء مسح الباركود بعد تأكد تشغيل الفيديو
                video.onloadedmetadata = () => {
                    video.play();
                    startBarcodeDetection();
                };
                
            } catch (err) {
                statusDiv.innerHTML = '❌ فشل تشغيل الكاميرا: ' + err.message;
                statusDiv.style.color = '#c62828';
                console.error('Start scanner error:', err);
            }
        }
        
        function stopScanner() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            scanningActive = false;
            if (scanTimeout) clearTimeout(scanTimeout);
            
            const video = document.getElementById('video');
            if (video) video.srcObject = null;
            
            const statusDiv = document.getElementById('cameraStatus');
            statusDiv.innerHTML = '⏹️ الكاميرا متوقفة';
            statusDiv.style.color = '#666';
        }
        
        // ======================
        // 5. مسح الباركود
        // ======================
        function startBarcodeDetection() {
            if (!scanningActive) return;
            
            const video = document.getElementById('video');
            if (video.readyState !== 4 || video.videoWidth === 0) {
                scanTimeout = setTimeout(startBarcodeDetection, 500);
                return;
            }
            
            scanBarcodeFrame();
        }
        
        function scanBarcodeFrame() {
            if (!scanningActive) {
                scanTimeout = setTimeout(scanBarcodeFrame, 200);
                return;
            }
            
            const video = document.getElementById('video');
            if (!video.videoWidth) {
                scanTimeout = setTimeout(scanBarcodeFrame, 200);
                return;
            }
            
            // إنشاء canvas لالتقاط الإطار
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // استخدام BarcodeDetector API
            if ('BarcodeDetector' in window) {
                const barcodeDetector = new BarcodeDetector({ 
                    formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'qr_code', 'codabar', 'itf'] 
                });
                
                barcodeDetector.detect(canvas)
                    .then(barcodes => {
                        if (barcodes.length > 0) {
                            const barcode = barcodes[0].rawValue;
                            if (barcode && barcode.length > 3) {
                                console.log('✅ تم مسح الباركود:', barcode);
                                stopScanner();
                                processBarcode(barcode);
                                return;
                            }
                        }
                        scanTimeout = setTimeout(scanBarcodeFrame, 300);
                    })
                    .catch(err => {
                        console.log('Barcode detection error:', err);
                        scanTimeout = setTimeout(scanBarcodeFrame, 300);
                    });
            } else {
                // للمتصفحات القديمة - إدخال يدوي
                const manualBarcode = prompt('المتصفح لا يدعم المسح التلقائي. الرجاء إدخال رقم الباركود يدوياً:');
                if (manualBarcode && manualBarcode.length > 3) {
                    stopScanner();
                    processBarcode(manualBarcode);
                } else {
                    scanTimeout = setTimeout(scanBarcodeFrame, 1000);
                }
            }
        }
        
        // ======================
        // 6. البحث في Open Food Facts
        // ======================
        async function searchOpenFoodFacts(barcode) {
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();
                
                if (data.status === 1) {
                    const product = data.product;
                    let ingredients = product.ingredients_text_ar || product.ingredients_text || '';
                    let ingredientsList = [];
                    
                    if (ingredients) {
                        ingredientsList = ingredients.split(',').map(i => i.trim()).filter(i => i);
                    }
                    
                    // كشف المواد الضارة
                    const harmfulKeywords = ['سكر مضاف', 'زيت مهدرج', 'جلوتامات', 'أسبارتام', 'بنزوات', 'سوربات', 'بارابين', 'سلفات', 'صبغة صناعية', 'نكهات صناعية'];
                    const warnings = [];
                    
                    for (const keyword of harmfulKeywords) {
                        if (ingredients.toLowerCase().includes(keyword.toLowerCase())) {
                            warnings.push(`⚠️ يحتوي على ${keyword} - قد يكون ضاراً`);
                        }
                    }
                    
                    if (warnings.length === 0 && ingredients) {
                        warnings.push('✅ لم يتم اكتشاف مواد ضارة واضحة في قاعدة البيانات');
                    }
                    
                    let category = 'منتج عام';
                    const categories = JSON.stringify(product.categories_tags || []).toLowerCase();
                    if (categories.includes('cosmetic') || categories.includes('beauty')) category = 'تجميلي';
                    else if (categories.includes('medicine') || categories.includes('health')) category = 'دوائي';
                    else if (categories.includes('food') || categories.includes('drink')) category = 'غذائي';
                    
                    return {
                        product_name: product.product_name_ar || product.product_name || 'منتج غير معروف',
                        ingredients: ingredientsList.length ? ingredientsList : [ingredients || 'لا توجد معلومات'],
                        warnings: warnings,
                        category: category,
                        source: 'Open Food Facts'
                    };
                }
                return null;
            } catch (error) {
                console.log('Open Food Facts error:', error);
                return null;
            }
        }
        
        // ======================
        // 7. تحليل Gemini
        // ======================
        async function analyzeWithGemini(barcode) {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') {
                throw new Error('الرجاء إضافة مفتاح Gemini API الصحيح في الكود');
            }
            
            const prompt = `أنت خبير تحليل منتجات. المنتج رقم باركوده: ${barcode}
            
قم بتحليل هذا المنتج وأعد JSON فقط بالشكل التالي، بدون أي كلام إضافي:
{
    "product_name": "اسم المنتج المتوقع بالعربية",
    "ingredients": ["مكون1", "مكون2", "مكون3"],
    "warnings": ["تحذير عن أي مادة ضارة أو مسببة للحساسية"],
    "category": "غذائي أو تجميلي أو دوائي"
}

ملاحظات:
- إذا كان غذائي: حذر من السكر المضاف، الزيوت المهدرجة، المواد الحافظة
- إذا كان تجميلي: حذر من البارابين، السلفات، العطور الصناعية
- إذا كان دوائي: حذر من الآثار الجانبية المحتملة`;
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': application/json },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });
            
            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);
            
            const text = data.candidates[0].content.parts[0].text;
            const cleanJson = text.replace(/```json/g, '').replace(/```/g, '').trim();
            const result = JSON.parse(cleanJson);
            result.source = 'الذكاء الاصطناعي Gemini';
            return result;
        }
        
        // ======================
        // 8. معالجة الباركود
        // ======================
        async function processBarcode(barcode) {
            const resultDiv = document.getElementById('resultContent');
            resultDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>جاري تحليل المنتج...</p>
                    <p style="font-size: 12px; color: #999;">باركود: ${barcode}</p>
                </div>
            `;
            document.getElementById('resultCard').classList.remove('hide');
            
            try {
                let productData = null;
                
                // الخطوة 1: البحث في Open Food Facts
                productData = await searchOpenFoodFacts(barcode);
                
                // الخطوة 2: إذا لم يوجد، استخدام Gemini
                if (!productData) {
                    productData = await analyzeWithGemini(barcode);
                }
                
                productData.barcode = barcode;
                
                // حفظ في السجل
                addToHistory(productData);
                
                displayResult(productData);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="message-error">
                        ❌ خطأ: ${error.message}<br>
                        <small>يرجى التحقق من اتصال الإنترنت ومفتاح API</small>
                    </div>
                `;
            }
        }
        
        function displayResult(product) {
            const resultDiv = document.getElementById('resultContent');
            
            const warningsHtml = product.warnings && product.warnings.length > 0 
                ? product.warnings.map(w => `<div class="warning-item">${w}</div>`).join('')
                : '<div class="warning-item">✅ لم يتم اكتشاف مواد ضارة</div>';
            
            const ingredientsHtml = product.ingredients && product.ingredients.length > 0
                ? product.ingredients.map(i => `<div class="ingredient-item">• ${i}</div>`).join('')
                : '<div class="ingredient-item">لا توجد معلومات عن المكونات</div>';
            
            const categoryClass = product.category === 'غذائي' ? 'category-food' : 
                                 (product.category === 'تجميلي' ? 'category-cosmetic' : 'category-medicine');
            
            resultDiv.innerHTML = `
                <div class="product-name">${escapeHtml(product.product_name)}</div>
                <div class="category ${categoryClass}">📂 ${product.category || 'غير محدد'}</div>
                <div style="font-size: 12px; color: #999; margin-bottom: 10px;">
                    🔍 المصدر: ${product.source || 'تحليل ذكاء اصطناعي'} • باركود: ${product.barcode}
                </div>
                
                <div class="section">
                    <div class="section-title">⚠️ التحذيرات والمواد الضارة</div>
                    ${warningsHtml}
                </div>
                
                <div class="section">
                    <div class="section-title">📋 قائمة المكونات</div>
                    ${ingredientsHtml}
                </div>
                
                <div class="section" style="background: #e8f5e9; padding: 10px; border-radius: 10px; margin-top: 15px;">
                    <div style="font-size: 14px; text-align: center;">
                        💡 نصيحة: دائماً اقرأ الملصق الأصلي للمنتج قبل الاستخدام
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ======================
        // 9. السجل المحلي
        // ======================
        function loadHistory() {
            const saved = localStorage.getItem('productScanHistory');
            if (saved) {
                scanHistory = JSON.parse(saved);
                renderHistory();
            }
        }
        
        function saveHistory() {
            localStorage.setItem('productScanHistory', JSON.stringify(scanHistory));
            renderHistory();
        }
        
        function renderHistory() {
            const historyDiv = document.getElementById('historyList');
            if (!historyDiv) return;
            
            if (scanHistory.length === 0) {
                historyDiv.innerHTML = '<p style="text-align: center; color: #999;">لا يوجد منتجات ممسوحة ضوئياً بعد</p>';
                return;
            }
            
            historyDiv.innerHTML = [...scanHistory].reverse().map(item => `
                <div class="history-item" onclick="viewHistoryProduct(${item.id})">
                    <div class="history-product">${escapeHtml(item.product_name || 'منتج غير معروف')}</div>
                    <div class="history-date">${item.date} • باركود: ${item.barcode}</div>
                    ${item.warnings && item.warnings.length > 0 ? '<div style="color: #ff9800; font-size: 12px; margin-top: 5px;">⚠️ يحتوي على تحذيرات</div>' : ''}
                </div>
            `).join('');
        }
        
        function viewHistoryProduct(id) {
            const product = scanHistory.find(p => p.id === id);
            if (product) {
                displayResult(product);
                document.getElementById('resultCard').classList.remove('hide');
                switchTab('scanner');
            }
        }
        
        function addToHistory(productData) {
            const newProduct = {
                ...productData,
                id: Date.now(),
                date: new Date().toLocaleString('ar-SA')
            };
            scanHistory.push(newProduct);
            saveHistory();
        }
        
        function clearHistory() {
            if (confirm('هل أنت متأكد من مسح جميع المنتجات من السجل؟')) {
                scanHistory = [];
                saveHistory();
                closeResult();
            }
        }
        
        function closeResult() {
            document.getElementById('resultCard').classList.add('hide');
        }
        
        // ======================
        // 10. التبويبات
        // ======================
        function switchTab(tab) {
            const scannerTab = document.getElementById('scannerTab');
            const historyTab = document.getElementById('historyTab');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'scanner') {
                scannerTab.classList.remove('hide');
                historyTab.classList.add('hide');
                tabs[0].classList.add('active');
            } else {
                scannerTab.classList.add('hide');
                historyTab.classList.remove('hide');
                tabs[1].classList.add('active');
                renderHistory();
                stopScanner();
            }
            
            closeResult();
        }
        
        // ======================
        // 11. التشغيل الأولي
        // ======================
        loadHistory();
        
        window.addEventListener('beforeunload', () => {
            stopScanner();
        });
        
        // محاولة طلب الصلاحية عند تحميل الصفحة (لـ Kodular)
        setTimeout(() => {
            requestCameraPermission();
        }, 500);
    </script>
</body>
</html>
